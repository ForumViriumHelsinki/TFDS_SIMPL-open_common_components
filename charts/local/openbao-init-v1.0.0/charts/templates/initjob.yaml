apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-init
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: openbao-{{ .Values.cluster.namespace }}-svc-account
      initContainers:
      - name: 0-init
        image: "quay.io/openbao/openbao:{{ .Values.imageTag }}"
        command: [sh, -c]
        args:
          - |
            until wget --spider --quiet --timeout=10 --tries=1 --no-check-certificate $VAULT_ADDR 2>/dev/null; do
              echo "Waiting for OpenBao to be accessible..."
              sleep 5
            done

            bao operator init -format json >> /data/init.json || {
              echo "Init failed (possibly already initialized), continuing..."
            }
        env:
          - name: VAULT_ADDR
            value: https://secrets.{{ .Values.namespaceTag }}.{{ .Values.domainSuffix }}
          - name: VAULT_SKIP_VERIFY
            value: "true"
        volumeMounts:
        - name: init-bao-volume
          mountPath: /data
      - name: 1-bao-secret
        image: "alpine/kubectl:latest"
        command: [sh, -c]
        args:
          - |
            if [ -f /etc/alpine-release ]; then apk add jq; fi

            timeout 300 sh -c 'while [ ! -f /data/init.json ]; do sleep 5; done' || exit 1

            UNSEAL_KEYS=$(cat /data/init.json | jq -r '.unseal_keys_b64[]')
            ROOT_TOKEN=$(cat /data/init.json | jq -r '.root_token')

            # Create secret with unseal keys
            echo "y" | kubectl delete secret secrets-unseal-keys -i
            kubectl create secret generic secrets-unseal-keys \
              --from-literal=key1=$(echo $UNSEAL_KEYS | cut -d' ' -f1) \
              --from-literal=key2=$(echo $UNSEAL_KEYS | cut -d' ' -f2) \
              --from-literal=key3=$(echo $UNSEAL_KEYS | cut -d' ' -f3) \
              --from-literal=key4=$(echo $UNSEAL_KEYS | cut -d' ' -f2) \
              --from-literal=key5=$(echo $UNSEAL_KEYS | cut -d' ' -f2) || true

            # Create secret with root token
            echo "y" | kubectl delete secret secrets-root-token -i
            kubectl create secret generic secrets-root-token \
              --from-literal=token=$ROOT_TOKEN || true
        volumeMounts:
        - name: init-bao-volume
          mountPath: /data
      - name: 2-unseal
        image: "quay.io/openbao/openbao:{{ .Values.imageTag }}"
        command: [sh, -c]
        args:
          - |
            until wget --spider --quiet --timeout=10 --tries=1 --no-check-certificate $VAULT_ADDR 2>/dev/null; do
              echo "Waiting for OpenBao to be accessible..."
              sleep 5
            done
            
            bao operator unseal $key1
            bao operator unseal $key2
            bao operator unseal $key3
        env:
          - name: VAULT_ADDR
            value: https://secrets.{{ .Values.namespaceTag }}.{{ .Values.domainSuffix }}
        envFrom:
        - secretRef:
            name: secrets-unseal-keys
      containers:
      - name: final-step
        image: busybox
        command: ['sh', '-c', 'echo "Final step: End the process"']
        volumeMounts:
        - name: init-bao-volume
          mountPath: /data
      restartPolicy: Never
      volumes:
      - name: init-bao-volume
        persistentVolumeClaim:
          claimName: init-bao-{{ .Values.cluster.namespace }}-pvc