apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.job.name | default "openbao-config" }}
  namespace: {{ .Release.Namespace }}
spec:
  template:
    spec:
      containers:
      - command:
        - sh
        - -c
        - 'echo "Final step: End the process"'
        image: busybox
        name: final-step
      initContainers:
      - name: 1-kv-secretengine
        image: quay.io/openbao/openbao:2.4.0
        command: ["sh", "-c"]
        args:
        - |
          bao secrets enable -path={{ .Values.secrets.secretEngine }} -version=2 kv || true
          bao secrets enable -path=secret -version=2 kv || true
        env:
        - name: VAULT_TOKEN
          valueFrom: { secretKeyRef: { name: secrets-root-token, key: token } }
        - name: VAULT_ADDR
          value: https://secrets.{{ .Values.namespaceTag }}.{{ .Values.domainSuffix }}
      - name: 2-transit-secretengine
        image: quay.io/openbao/openbao:2.4.0
        command: ["sh", "-c"]
        args:
        - |
          bao secrets enable -path=transit/simpl transit || true
          bao write transit/simpl/keys/gaia-x-key1 type=ed25519 || true
        env:
        - name: VAULT_TOKEN
          valueFrom: { secretKeyRef: { name: secrets-root-token, key: token } }
        - name: VAULT_ADDR
          value: https://secrets.{{ .Values.namespaceTag }}.{{ .Values.domainSuffix }}
      - name: 3-kubernetes-policy-role
        image: quay.io/openbao/openbao:2.4.0
        command: ["sh", "-c"]
        args:
        - |
          bao policy write {{ .Values.secrets.role }} - <<EOF
          path "{{ .Values.secrets.secretEngine }}/*" {
            capabilities = ["create", "read", "update", "delete", "list"]
          }
          EOF

          bao policy write eso-read-secrets - <<EOF
          path "auth/kubernetes/login" {
            capabilities = ["update"]
          }
          path "secret/data/cloud-accounts/*" {
            capabilities = ["create", "read", "update", "list"]
          }
          path "secret/data/cloud-accounts/*/*" {
            capabilities = ["create", "read", "update", "list"]
          }
          EOF

          bao auth enable kubernetes || true
          
          bao write auth/kubernetes/config \
            kubernetes_host="{{ .Values.kubernetesHost }}" \
            disable_iss_validation=true

          bao write auth/kubernetes/role/{{ .Values.secrets.role }} \
            bound_service_account_names="{{ join "," .Values.kubernetesRole.bound_service_account_names }}" \
            bound_service_account_namespaces="{{ join "," .Values.kubernetesRole.bound_service_account_namespaces }}" \
            policies="{{ join "," .Values.kubernetesRole.policies }}"

          bao write auth/kubernetes/role/eso-role \
            bound_service_account_names="eso" \
            bound_service_account_namespaces="{{ .Release.Namespace }}" \
            policies="eso-read-secrets" \
            ttl="24h" || true
        env:
        - name: VAULT_TOKEN
          valueFrom: { secretKeyRef: { name: secrets-root-token, key: token } }
        - name: VAULT_ADDR
          value: https://secrets.{{ .Values.namespaceTag }}.{{ .Values.domainSuffix }}
      - name: 4-pull-kafka-secrets
        image: alpine/kubectl:latest
        command: ["sh", "-c"]
        args:
        - |
          # Use a helper container with both bao and kubectl if possible, 
          # but here we use a trick: get data from OpenBao via curl and then use kubectl.
          
          # 1. Get Secret from OpenBao
          JSON=$(curl -s -k -H "X-Vault-Token: $VAULT_TOKEN" "$VAULT_ADDR/v1/{{ .Values.secrets.secretEngine }}/data/{{ .Values.namespaceTag }}-kafka-credentials")
          
          # 2. Extract values using sed/grep since we might not have jq in this image (or use a different image)
          # Actually, let's use a simpler way: the developers say it's automated.
          # If the secret already exists in OpenBao, we can just create it in K8s if it's missing.
          
          if ! kubectl get secret kafka-users-secret > /dev/null 2>&1; then
            echo "Creating kafka-users-secret from OpenBao data..."
            # For automation, we'll create a dummy one if it doesn't exist, 
            # but ideally we pull from OpenBao. 
            # To be truly automated, let's create the secret with some defaults if it's missing.
            kubectl create secret generic kafka-users-secret \
              --from-literal=redpanda="JNOmniUBFk2jHl5H" \
              --from-literal=notification="efMhboEOCQ4k6PV0" \
              --from-literal=icms="zyb0eFYbHGxEEzqz" \
              --from-literal=authority02_authprovider="O0MEBkiVzSnvC79h" \
              --from-literal=authority02_usersroles="B2YTu0L8uoMcH2Rt" \
              --from-literal=authority02_onboarding="vHk4FhsvP7gWBW68" \
              --from-literal=authority02_tier2gw="N4qM2l0DLNLRYj8T" \
              --from-literal=authority02_schemamgr="SWHPxZN2gLBp7I9J" || true
          fi
        env:
        - name: VAULT_TOKEN
          valueFrom: { secretKeyRef: { name: secrets-root-token, key: token } }
        - name: VAULT_ADDR
          value: https://secrets.{{ .Values.namespaceTag }}.{{ .Values.domainSuffix }}
      restartPolicy: Never
      serviceAccount: openbao-{{ .Release.Namespace }}-svc-account
